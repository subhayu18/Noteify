<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --card-bg:rgba(255,255,255,0.72);
  --text:#1f2937;
  --muted:#6b7280;
  --shadow:0 10px 30px rgba(0,0,0,.12);
}

.dark{
  --card-bg:rgba(17,24,39,.75);
  --text:#f3f4f6;
  --muted:#d1d5db;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  min-height:100vh;
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  color:var(--text);
  background:linear-gradient(-45deg,#f9fafb,#dbeafe,#dcfce7,#ffedd5);
  background-size:400% 400%;
  animation:gradientShift 12s ease infinite;
  display:flex;
  flex-direction:column;
  transition:.3s;
}

.dark body,
body.dark{
  background:linear-gradient(-45deg,#0f172a,#111827,#1e293b,#172554);
}

@keyframes gradientShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

header{
  text-align:center;
  padding:40px 20px 20px;
  position:relative;
  animation:fadeIn 1s ease;
}

h1{
  font-size:3.3rem;
  margin:0;
  color:#1e3a8a;
}

.dark h1{color:#93c5fd}

.subtitle{
  margin-top:10px;
  color:var(--muted);
  font-size:1rem;
}

.typing{
  margin-top:12px;
  height:30px;
  display:inline-block;
  border-right:2px solid currentColor;
  white-space:nowrap;
  overflow:hidden;
}

.top-actions{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}

.action-btn{
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  background:#f59e0b;
  color:white;
  font-weight:600;
}

.theme-btn{
  background:#111827;
}

.content{
  flex:1;
  width:min(1100px,92%);
  margin:auto;
}

.year-buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin:20px 0 30px;
}

.year-buttons button{
  border:none;
  padding:14px 24px;
  border-radius:12px;
  cursor:pointer;
  background:var(--primary);
  color:white;
  font-weight:600;
  transition:.25s;
}

.year-buttons button:hover{
  transform:translateY(-3px);
}

.year-buttons button.active{
  background:var(--primary-dark);
}

.resource-card{
  background:var(--card-bg);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:25px;
  box-shadow:var(--shadow);
  min-height:220px;
}

.submenu{
  display:none;
  flex-direction:column;
  gap:14px;
  animation:fadeIn .35s ease;
}

.submenu a{
  text-decoration:none;
  color:#1e3a8a;
  background:#e0ecff;
  padding:14px 18px;
  border-radius:12px;
  font-weight:700;
  transition:.25s;
}

.dark .submenu a{
  color:white;
  background:#1e3a8a;
}

.submenu a:hover{
  transform:translateX(6px);
}

footer{
  margin-top:40px;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(10px);
  padding:24px;
  text-align:center;
}

.dark footer{
  background:rgba(17,24,39,.75);
}

.community-btn{
  display:block;
  max-width:500px;
  margin:15px auto;
  text-decoration:none;
  background:#16a34a;
  color:white;
  padding:15px;
  border-radius:12px;
  font-weight:700;
}

.contact-btn{
  display:inline-block;
  text-decoration:none;
  color:white;
  padding:10px 18px;
  border-radius:10px;
  margin:5px;
  font-weight:600;
}

.whatsapp{background:#25D366}
.email{background:#1e88e5}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

@media(max-width:768px){
  h1{font-size:2.5rem}
  .top-actions{
    position:static;
    justify-content:center;
    margin-top:15px;
  }
}
</style>
</head>

<script>
function showSubmenu(id,btn){
  document.querySelectorAll('.submenu').forEach(x=>x.style.display='none');
  document.querySelectorAll('.year-buttons button').forEach(x=>x.classList.remove('active'));
  document.getElementById(id).style.display='flex';
  if(btn) btn.classList.add('active');
}

const tagline="Notes • PYQs • Textbooks • AMCAT • GATE";
const typingEl=document.querySelector('.typing');
let i=0;

(function type(){
  if(i<tagline.length){
    typingEl.textContent=tagline.slice(0,i+1);
    i++;
    setTimeout(type,55);
  }
})();

function toggleTheme(){
  document.body.classList.toggle('dark');
}

window.onload=()=>{
  const first=document.querySelector('.year-buttons button');
  showSubmenu('year1',first);
};
</script>
